app:
  name: omniflow-go
  env: local
  version: 0.1.0

server:
  host: 0.0.0.0
  port: 8850
  mode: debug
  read_timeout: 10s
  write_timeout: 15s
  idle_timeout: 60s
  shutdown_timeout: 10s

log:
  # debug: 默认 text；release: 默认 json
  format: text
  # debug/info/warn/error
  level: debug
  # 是否输出调用源码位置（建议 debug 开启，线上按需）
  add_source: true
  console:
    enabled: true
    # 仅在 text 格式下生效，控制台按级别上色（debug/info/warn/error）
    color: true
  file:
    enabled: false
    # 不配置 path 时不会写文件
    path: ./logs/omniflow-go.log
    max_size_mb: 100
    max_backups: 10
    max_age_days: 30
    compress: true
    local_time: true

database:
  dsn: postgres://postgres:123456@127.0.0.1:5432/omniflow?sslmode=disable
  max_open_conns: 20
  max_idle_conns: 10
  conn_max_lifetime: 30m
  # silent/error/warn/info
  log_level: silent
  # true 时强制以 info 级别输出 SQL（便于本地联调排查）
  debug_sql: false

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0

storage:
  provider: minio

minio:
  endpoint: localhost:9000
  access_key: admin
  secret_key: admin123
  use_ssl: false
  bucket: my-bucket
